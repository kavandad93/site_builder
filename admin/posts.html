<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت مطالب - سایت‌ساز حرفه‌ای</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-content">
            <div class="logo"><a href="index.html">🚀 <span>Site</span>Builder</a></div>
            <div class="admin-user">
                <span id="userDisplay">مدیر</span>
                <div class="avatar">M</div>
                <a href="#" onclick="Auth.logout(); return false;" style="color:#c3c4c7; text-decoration:none; font-size:13px;">خروج</a>
            </div>
        </div>
    </header>

    <div class="admin-wrap">
        <aside class="admin-sidebar">
            <a href="index.html" class="menu-item"><span class="icon">📊</span><span>پیشخوان</span></a>
            <a href="posts.html" class="menu-item active"><span class="icon">📝</span><span>مطالب</span></a>
            <a href="pages.html" class="menu-item"><span class="icon">📄</span><span>صفحات</span></a>
            <a href="category.html" class="menu-item"><span class="icon">🏷️</span><span>دسته‌بندی‌ها</span></a>
            <a href="media.html" class="menu-item"><span class="icon">🖼️</span><span>رسانه</span></a>
            <a href="users.html" class="menu-item"><span class="icon">👤</span><span>کاربران</span></a>
            <a href="builder.html" class="menu-item"><span class="icon">🧩</span><span>سازنده صفحه</span></a>
            <div class="menu-divider"></div>
            <a href="settings.html" class="menu-item"><span class="icon">⚙️</span><span>تنظیمات</span></a>
            <a href="../index.html" class="menu-item" target="_blank"><span class="icon">🌐</span><span>مشاهده سایت</span></a>
        </aside>

        <main class="admin-main">
            <div class="top-bar">
                <h1>📝 مدیریت مطالب</h1>
                <div class="actions">
                    <button class="btn btn-primary" onclick="showAddModal()">➕ مطلب جدید</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>لیست مطالب</h2>
                    <div>
                        <select id="statusFilter" onchange="loadPosts()" class="form-control" style="width:auto; display:inline-block; padding:5px 12px;">
                            <option value="">همه</option>
                            <option value="published">منتشر شده</option>
                            <option value="draft">پیش‌نویس</option>
                            <option value="pending">در انتظار</option>
                            <option value="trash">زباله‌دان</option>
                        </select>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>عنوان</th><th>دسته‌بندی</th><th>وضعیت</th><th>تاریخ</th><th>عملیات</th></tr></thead>
                        <tbody id="postsTable"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Add/Edit Post -->
    <div id="postModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:12px; max-width:600px; width:90%; max-height:90vh; overflow-y:auto; padding:30px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid var(--border);">
                <h3 id="modalTitle">مطلب جدید</h3>
                <button onclick="closeModal()" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);">&times;</button>
            </div>
            <form id="postForm" onsubmit="savePost(event)">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>عنوان</label>
                    <input type="text" id="postTitle" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>محتوا</label>
                    <textarea id="postContent" class="form-control" rows="6"></textarea>
                </div>
                <div class="form-group">
                    <label>دسته‌بندی</label>
                    <select id="postCategory" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label>وضعیت</label>
                    <select id="postStatus" class="form-control">
                        <option value="draft">پیش‌نویس</option>
                        <option value="published">منتشر شده</option>
                        <option value="pending">در انتظار</option>
                    </select>
                </div>
                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">لغو</button>
                    <button type="submit" class="btn btn-success">💾 ذخیره</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/database.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        if (!Auth.isLoggedIn()) window.location.href = 'login.html';
        
        const user = Auth.getCurrentUser();
        if (user) document.getElementById('userDisplay').textContent = user.display_name || user.username;

        function loadPosts() {
            const filter = document.getElementById('statusFilter').value;
            let posts = DB.get(DB.keys.posts);
            if (filter) posts = posts.filter(p => p.status === filter);
            posts.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            
            const categories = DB.get(DB.keys.categories);
            const tbody = document.getElementById('postsTable');
            
            if (posts.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--gray);">هیچ مطلبی یافت نشد</td></tr>`;
                return;
            }
            
            tbody.innerHTML = posts.map(post => {
                const cat = categories.find(c => c.id === post.category_id);
                const statusClass = post.status === 'published' ? 'published' : post.status === 'draft' ? 'draft' : 'pending';
                const statusLabel = post.status === 'published' ? 'منتشر شده' : post.status === 'draft' ? 'پیش‌نویس' : 'در انتظار';
                return `<tr>
                    <td><strong>${post.title}</strong></td>
                    <td>${cat ? cat.name : 'دسته‌بندی نشده'}</td>
                    <td><span class="status ${statusClass}">${statusLabel}</span></td>
                    <td>${new Date(post.created_at).toLocaleDateString('fa-IR')}</td>
                    <td>
                        <button class="btn btn-sm" onclick="editPost(${post.id})">✏️</button>
                        <button class="btn btn-sm btn-danger" onclick="deletePost(${post.id})">🗑️</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = 'مطلب جدید';
            document.getElementById('editId').value = '';
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('postStatus').value = 'draft';
            loadCategories();
            document.getElementById('postModal').style.display = 'flex';
        }

        function editPost(id) {
            const post = DB.getById(DB.keys.posts, id);
            if (!post) return;
            document.getElementById('modalTitle').textContent = 'ویرایش مطلب';
            document.getElementById('editId').value = id;
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postContent').value = post.content;
            document.getElementById('postStatus').value = post.status;
            loadCategories(post.category_id);
            document.getElementById('postModal').style.display = 'flex';
        }

        function loadCategories(selected) {
            const categories = DB.get(DB.keys.categories);
            const select = document.getElementById('postCategory');
            select.innerHTML = categories.map(c => 
                `<option value="${c.id}" ${c.id === selected ? 'selected' : ''}>${c.name}</option>`
            ).join('');
        }

        function savePost(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('postTitle').value.trim(),
                content: document.getElementById('postContent').value,
                category_id: parseInt(document.getElementById('postCategory').value),
                status: document.getElementById('postStatus').value,
                author_id: Auth.getCurrentUser().id,
                slug: document.getElementById('postTitle').value.trim().replace(/ /g, '-')
            };
            
            if (id) {
                DB.update(DB.keys.posts, parseInt(id), data);
            } else {
                DB.create(DB.keys.posts, data);
            }
            
            closeModal();
            loadPosts();
            alert('✅ مطلب با موفقیت ذخیره شد!');
        }

        function deletePost(id) {
            if (confirm('آیا از حذف این مطلب اطمینان دارید؟')) {
                DB.delete(DB.keys.posts, id);
                loadPosts();
                alert('🗑️ مطلب حذف شد!');
            }
        }

        function closeModal() {
            document.getElementById('postModal').style.display = 'none';
        }

        loadPosts();
    </script>
</body>
</html>
