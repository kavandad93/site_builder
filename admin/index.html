<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیشخوان - سایت‌ساز حرفه‌ای</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-content">
            <div class="logo"><a href="index.html">🚀 <span>Site</span>Builder</a></div>
            <div class="admin-user">
                <span id="userDisplay">مدیر</span>
                <div class="avatar">M</div>
                <a href="#" onclick="Auth.logout(); return false;" style="color:#c3c4c7; text-decoration:none; font-size:13px;">خروج</a>
            </div>
        </div>
    </header>

    <div class="admin-wrap">
        <aside class="admin-sidebar">
            <a href="index.html" class="menu-item active"><span class="icon">📊</span><span>پیشخوان</span></a>
            <a href="posts.html" class="menu-item"><span class="icon">📝</span><span>مطالب</span></a>
            <a href="pages.html" class="menu-item"><span class="icon">📄</span><span>صفحات</span></a>
            <a href="category.html" class="menu-item"><span class="icon">🏷️</span><span>دسته‌بندی‌ها</span></a>
            <a href="media.html" class="menu-item"><span class="icon">🖼️</span><span>رسانه</span></a>
            <a href="users.html" class="menu-item"><span class="icon">👤</span><span>کاربران</span></a>
            <a href="builder.html" class="menu-item"><span class="icon">🧩</span><span>سازنده صفحه</span></a>
            <div class="menu-divider"></div>
            <a href="settings.html" class="menu-item"><span class="icon">⚙️</span><span>تنظیمات</span></a>
            <a href="../index.html" class="menu-item" target="_blank"><span class="icon">🌐</span><span>مشاهده سایت</span></a>
        </aside>

        <main class="admin-main">
            <div class="top-bar">
                <h1>📊 پیشخوان</h1>
                <div class="actions">
                    <a href="posts.html" class="btn btn-primary">➕ مطلب جدید</a>
                    <a href="builder.html" class="btn btn-outline">🧩 ساخت صفحه</a>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div class="card">
                <div class="card-header">
                    <h2>📋 آخرین مطالب</h2>
                    <a href="posts.html" style="color:var(--primary); text-decoration:none; font-size:14px;">مشاهده همه →</a>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>عنوان</th><th>دسته‌بندی</th><th>وضعیت</th><th>تاریخ</th><th>عملیات</th></tr></thead>
                        <tbody id="recentPosts"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/database.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        if (!Auth.isLoggedIn()) window.location.href = 'login.html';
        
        const user = Auth.getCurrentUser();
        if (user) document.getElementById('userDisplay').textContent = user.display_name || user.username;

        function loadStats() {
            const stats = DB.getStats();
            const grid = document.getElementById('statsGrid');
            const items = [
                { icon: '📝', number: stats.published_posts, label: 'مطالب منتشر شده' },
                { icon: '📄', number: stats.total_pages, label: 'صفحات' },
                { icon: '👤', number: stats.total_users, label: 'کاربران' },
                { icon: '🏷️', number: stats.total_categories, label: 'دسته‌بندی‌ها' },
                { icon: '👁️', number: stats.total_views, label: 'بازدید کل' }
            ];
            grid.innerHTML = items.map(item => `
                <div class="stat-card">
                    <div class="icon">${item.icon}</div>
                    <div class="number">${item.number}</div>
                    <div class="label">${item.label}</div>
                </div>
            `).join('');
        }

        function loadRecentPosts() {
            const posts = DB.get(DB.keys.posts).filter(p => p.status === 'published').sort((a,b) => 
                new Date(b.created_at) - new Date(a.created_at)
            ).slice(0, 5);
            
            const tbody = document.getElementById('recentPosts');
            const categories = DB.get(DB.keys.categories);
            
            tbody.innerHTML = posts.map(post => {
                const cat = categories.find(c => c.id === post.category_id);
                return `<tr>
                    <td><a href="#" style="color:var(--primary); text-decoration:none; font-weight:600;">${post.title}</a></td>
                    <td>${cat ? cat.name : 'دسته‌بندی نشده'}</td>
                    <td><span class="status published">منتشر شده</span></td>
                    <td>${new Date(post.created_at).toLocaleDateString('fa-IR')}</td>
                    <td>
                        <button class="btn btn-sm">✏️</button>
                        <button class="btn btn-sm btn-danger">🗑️</button>
                    </td>
                </tr>`;
            }).join('');
        }

        loadStats();
        loadRecentPosts();
    </script>
</body>
</html>
