<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود - سایت‌ساز حرفه‌ای</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #fff;
            border-radius: 12px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-container .logo {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 30px;
        }
        .login-container .logo span { color: var(--primary); }
        .login-container .form-group { margin-bottom: 20px; }
        .login-container .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .login-container .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .login-container .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(34,113,177,0.15);
        }
        .login-container .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-container .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .login-container .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .login-container .alert.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .login-container .alert.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .login-container .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--gray);
        }
        .login-container .info-text strong { color: var(--primary); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🚀 <span>Site</span>Builder</div>
        <div id="alert" class="alert"></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" id="username" placeholder="admin" value="admin" required>
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="password" placeholder="admin123" value="admin123" required>
            </div>
            <button type="submit" class="btn-login">ورود به پنل مدیریت</button>
        </form>
        <div class="info-text">🔑 پیش‌فرض: <strong>admin</strong> / <strong>admin123</strong></div>
    </div>

    <script src="../assets/js/database.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const alertEl = document.getElementById('alert');
            
            if (!username || !password) {
                alertEl.className = 'alert error';
                alertEl.textContent = 'لطفاً نام کاربری و رمز عبور را وارد کنید!';
                return;
            }
            
            const result = Auth.login(username, password);
            
            if (result.success) {
                alertEl.className = 'alert success';
                alertEl.textContent = '✅ ورود موفق! در حال انتقال...';
                setTimeout(() => window.location.href = 'index.html', 1000);
            } else {
                alertEl.className = 'alert error';
                alertEl.textContent = result.message;
            }
        }
    </script>
</body>
</html>
