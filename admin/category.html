<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت دسته‌بندی‌ها - سایت‌ساز حرفه‌ای</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-content">
            <div class="logo"><a href="index.html">🚀 <span>Site</span>Builder</a></div>
            <div class="admin-user">
                <span id="userDisplay">مدیر</span>
                <div class="avatar">M</div>
                <a href="#" onclick="Auth.logout(); return false;" style="color:#c3c4c7; text-decoration:none; font-size:13px;">خروج</a>
            </div>
        </div>
    </header>

    <div class="admin-wrap">
        <aside class="admin-sidebar">
            <a href="index.html" class="menu-item"><span class="icon">📊</span><span>پیشخوان</span></a>
            <a href="posts.html" class="menu-item"><span class="icon">📝</span><span>مطالب</span></a>
            <a href="pages.html" class="menu-item"><span class="icon">📄</span><span>صفحات</span></a>
            <a href="category.html" class="menu-item active"><span class="icon">🏷️</span><span>دسته‌بندی‌ها</span></a>
            <a href="media.html" class="menu-item"><span class="icon">🖼️</span><span>رسانه</span></a>
            <a href="users.html" class="menu-item"><span class="icon">👤</span><span>کاربران</span></a>
            <a href="builder.html" class="menu-item"><span class="icon">🧩</span><span>سازنده صفحه</span></a>
            <div class="menu-divider"></div>
            <a href="settings.html" class="menu-item"><span class="icon">⚙️</span><span>تنظیمات</span></a>
            <a href="../index.html" class="menu-item" target="_blank"><span class="icon">🌐</span><span>مشاهده سایت</span></a>
        </aside>

        <main class="admin-main">
            <div class="top-bar">
                <h1>🏷️ مدیریت دسته‌بندی‌ها</h1>
                <div class="actions">
                    <button class="btn btn-primary" onclick="showAddModal()">➕ دسته‌بندی جدید</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>لیست دسته‌بندی‌ها</h2>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>نام</th><th>توضیحات</th><th>تعداد مطالب</th><th>عملیات</th></tr></thead>
                        <tbody id="categoriesTable"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="categoryModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:12px; max-width:500px; width:90%; max-height:90vh; overflow-y:auto; padding:30px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid var(--border);">
                <h3 id="modalTitle">دسته‌بندی جدید</h3>
                <button onclick="closeModal()" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);">&times;</button>
            </div>
            <form id="categoryForm" onsubmit="saveCategory(event)">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>نام دسته‌بندی</label>
                    <input type="text" id="categoryName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>توضیحات</label>
                    <textarea id="categoryDescription" class="form-control" rows="3"></textarea>
                </div>
                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">لغو</button>
                    <button type="submit" class="btn btn-success">💾 ذخیره</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/database.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        if (!Auth.isLoggedIn()) window.location.href = 'login.html';
        
        const user = Auth.getCurrentUser();
        if (user) document.getElementById('userDisplay').textContent = user.display_name || user.username;

        function loadCategories() {
            const categories = DB.get(DB.keys.categories);
            const posts = DB.get(DB.keys.posts);
            const tbody = document.getElementById('categoriesTable');
            
            if (categories.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--gray);">هیچ دسته‌بندی یافت نشد</td></tr>`;
                return;
            }
            
            tbody.innerHTML = categories.map(cat => {
                const count = posts.filter(p => p.category_id === cat.id).length;
                return `<tr>
                    <td><strong>${cat.name}</strong></td>
                    <td>${cat.description || '-'}</td>
                    <td>${count}</td>
                    <td>
                        <button class="btn btn-sm" onclick="editCategory(${cat.id})">✏️</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteCategory(${cat.id})">🗑️</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = 'دسته‌بندی جدید';
            document.getElementById('editId').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryDescription').value = '';
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function editCategory(id) {
            const cat = DB.getById(DB.keys.categories, id);
            if (!cat) return;
            document.getElementById('modalTitle').textContent = 'ویرایش دسته‌بندی';
            document.getElementById('editId').value = id;
            document.getElementById('categoryName').value = cat.name;
            document.getElementById('categoryDescription').value = cat.description || '';
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function saveCategory(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('categoryName').value.trim(),
                description: document.getElementById('categoryDescription').value,
                slug: document.getElementById('categoryName').value.trim().replace(/ /g, '-')
            };
            
            if (id) {
                DB.update(DB.keys.categories, parseInt(id), data);
            } else {
                DB.create(DB.keys.categories, data);
            }
            
            closeModal();
            loadCategories();
            alert('✅ دسته‌بندی با موفقیت ذخیره شد!');
        }

        function deleteCategory(id) {
            if (confirm('آیا از حذف این دسته‌بندی اطمینان دارید؟')) {
                DB.delete(DB.keys.categories, id);
                loadCategories();
                alert('🗑️ دسته‌بندی حذف شد!');
            }
        }

        function closeModal() {
            document.getElementById('categoryModal').style.display = 'none';
        }

        loadCategories();
    </script>
</body>
</html>
