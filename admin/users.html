<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت کاربران - سایت‌ساز حرفه‌ای</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-content">
            <div class="logo"><a href="index.html">🚀 <span>Site</span>Builder</a></div>
            <div class="admin-user">
                <span id="userDisplay">مدیر</span>
                <div class="avatar">M</div>
                <a href="#" onclick="Auth.logout(); return false;" style="color:#c3c4c7; text-decoration:none; font-size:13px;">خروج</a>
            </div>
        </div>
    </header>

    <div class="admin-wrap">
        <aside class="admin-sidebar">
            <a href="index.html" class="menu-item"><span class="icon">📊</span><span>پیشخوان</span></a>
            <a href="posts.html" class="menu-item"><span class="icon">📝</span><span>مطالب</span></a>
            <a href="pages.html" class="menu-item"><span class="icon">📄</span><span>صفحات</span></a>
            <a href="category.html" class="menu-item"><span class="icon">🏷️</span><span>دسته‌بندی‌ها</span></a>
            <a href="media.html" class="menu-item"><span class="icon">🖼️</span><span>رسانه</span></a>
            <a href="users.html" class="menu-item active"><span class="icon">👤</span><span>کاربران</span></a>
            <a href="builder.html" class="menu-item"><span class="icon">🧩</span><span>سازنده صفحه</span></a>
            <div class="menu-divider"></div>
            <a href="settings.html" class="menu-item"><span class="icon">⚙️</span><span>تنظیمات</span></a>
            <a href="../index.html" class="menu-item" target="_blank"><span class="icon">🌐</span><span>مشاهده سایت</span></a>
        </aside>

        <main class="admin-main">
            <div class="top-bar">
                <h1>👤 مدیریت کاربران</h1>
                <div class="actions">
                    <button class="btn btn-primary" onclick="showAddModal()">➕ کاربر جدید</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>لیست کاربران</h2>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>نام نمایشی</th><th>نام کاربری</th><th>ایمیل</th><th>نقش</th><th>عملیات</th></tr></thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="userModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:12px; max-width:500px; width:90%; max-height:90vh; overflow-y:auto; padding:30px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid var(--border);">
                <h3 id="modalTitle">کاربر جدید</h3>
                <button onclick="closeModal()" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);">&times;</button>
            </div>
            <form id="userForm" onsubmit="saveUser(event)">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>نام کاربری</label>
                    <input type="text" id="userUsername" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>نام نمایشی</label>
                    <input type="text" id="userDisplayName" class="form-control">
                </div>
                <div class="form-group">
                    <label>ایمیل</label>
                    <input type="email" id="userEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>رمز عبور</label>
                    <input type="password" id="userPassword" class="form-control" placeholder="حداقل ۶ کاراکتر">
                </div>
                <div class="form-group">
                    <label>نقش</label>
                    <select id="userRole" class="form-control">
                        <option value="subscriber">مشترک</option>
                        <option value="author">نویسنده</option>
                        <option value="editor">ویراستار</option>
                        <option value="admin">مدیر</option>
                    </select>
                </div>
                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">لغو</button>
                    <button type="submit" class="btn btn-success">💾 ذخیره</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/database.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        if (!Auth.isLoggedIn()) window.location.href = 'login.html';
        
        const currentUser = Auth.getCurrentUser();
        if (currentUser) document.getElementById('userDisplay').textContent = currentUser.display_name || currentUser.username;

        function loadUsers() {
            const users = Auth.getUsers();
            const tbody = document.getElementById('usersTable');
            
            if (users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--gray);">هیچ کاربری یافت نشد</td></tr>`;
                return;
            }
            
            tbody.innerHTML = users.map(user => {
                const roleLabels = {
                    admin: 'مدیر',
                    editor: 'ویراستار',
                    author: 'نویسنده',
                    subscriber: 'مشترک'
                };
                return `<tr>
                    <td><strong>${user.display_name || user.username}</strong></td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>${roleLabels[user.role] || user.role}</td>
                    <td>
                        <button class="btn btn-sm" onclick="editUser(${user.id})">✏️</button>
                        ${user.id !== currentUser.id ? `<button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">🗑️</button>` : ''}
                    </td>
                </tr>`;
            }).join('');
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = 'کاربر جدید';
            document.getElementById('editId').value = '';
            document.getElementById('userUsername').value = '';
            document.getElementById('userDisplayName').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userPassword').required = true;
            document.getElementById('userRole').value = 'subscriber';
            document.getElementById('userModal').style.display = 'flex';
        }

        function editUser(id) {
            const user = DB.getById(DB.keys.users, id);
            if (!user) return;
            document.getElementById('modalTitle').textContent = 'ویرایش کاربر';
            document.getElementById('editId').value = id;
            document.getElementById('userUsername').value = user.username;
            document.getElementById('userDisplayName').value = user.display_name || '';
            document.getElementById('userEmail').value = user.email;
            document.getElementById('userPassword').value = '';
            document.getElementById('userPassword').required = false;
            document.getElementById('userRole').value = user.role;
            document.getElementById('userModal').style.display = 'flex';
        }

        function saveUser(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const password = document.getElementById('userPassword').value;
            
            const data = {
                username: document.getElementById('userUsername').value.trim(),
                display_name: document.getElementById('userDisplayName').value.trim(),
                email: document.getElementById('userEmail').value.trim(),
                role: document.getElementById('userRole').value
            };
            
            if (password) data.password = password;
            
            if (id) {
                const result = Auth.updateUser(parseInt(id), data);
                if (result) {
                    closeModal();
                    loadUsers();
                    alert('✅ کاربر با موفقیت بروزرسانی شد!');
                }
            } else {
                if (!password) {
                    alert('لطفاً رمز عبور را وارد کنید!');
                    return;
                }
                const result = Auth.createUser(data);
                if (result.success) {
                    closeModal();
                    loadUsers();
                    alert('✅ کاربر با موفقیت ایجاد شد!');
                } else {
                    alert(result.message);
                }
            }
        }

        function deleteUser(id) {
            if (confirm('آیا از حذف این کاربر اطمینان دارید؟')) {
                const result = Auth.deleteUser(id);
                if (result.success) {
                    loadUsers();
                    alert('🗑️ کاربر حذف شد!');
                } else {
                    alert(result.message);
                }
            }
        }

        function closeModal() {
            document.getElementById('userModal').style.display = 'none';
        }

        loadUsers();
    </script>
</body>
</html>
