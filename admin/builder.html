<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سازنده صفحه - سایت‌ساز حرفه‌ای</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <style>
        .builder-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px 20px;
            min-height: 200px;
            text-align: center;
            color: var(--gray);
            transition: all 0.3s;
            cursor: pointer;
        }
        .builder-area:hover {
            border-color: var(--primary);
            background: rgba(34,113,177,0.05);
        }
        .builder-area .big-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
        .builder-blocks {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .block-item {
            background: #f8f9fa;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 15px 10px;
            text-align: center;
            cursor: grab;
            transition: all 0.3s;
        }
        .block-item:hover {
            border-color: var(--primary);
            background: #fff;
            transform: scale(1.05);
        }
        .block-item .block-icon { font-size: 28px; display: block; margin-bottom: 5px; }
        .block-item .block-name { font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-content">
            <div class="logo"><a href="index.html">🚀 <span>Site</span>Builder</a></div>
            <div class="admin-user">
                <span id="userDisplay">مدیر</span>
                <div class="avatar">M</div>
                <a href="#" onclick="Auth.logout(); return false;" style="color:#c3c4c7; text-decoration:none; font-size:13px;">خروج</a>
            </div>
        </div>
    </header>

    <div class="admin-wrap">
        <aside class="admin-sidebar">
            <a href="index.html" class="menu-item"><span class="icon">📊</span><span>پیشخوان</span></a>
            <a href="posts.html" class="menu-item"><span class="icon">📝</span><span>مطالب</span></a>
            <a href="pages.html" class="menu-item"><span class="icon">📄</span><span>صفحات</span></a>
            <a href="category.html" class="menu-item"><span class="icon">🏷️</span><span>دسته‌بندی‌ها</span></a>
            <a href="media.html" class="menu-item"><span class="icon">🖼️</span><span>رسانه</span></a>
            <a href="users.html" class="menu-item"><span class="icon">👤</span><span>کاربران</span></a>
            <a href="builder.html" class="menu-item active"><span class="icon">🧩</span><span>سازنده صفحه</span></a>
            <div class="menu-divider"></div>
            <a href="settings.html" class="menu-item"><span class="icon">⚙️</span><span>تنظیمات</span></a>
            <a href="../index.html" class="menu-item" target="_blank"><span class="icon">🌐</span><span>مشاهده سایت</span></a>
        </aside>

        <main class="admin-main">
            <div class="top-bar">
                <h1>🧩 سازنده صفحه</h1>
                <div class="actions">
                    <button class="btn btn-success" onclick="alert('✅ صفحه با موفقیت ذخیره شد!')">💾 ذخیره صفحه</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>ساخت صفحه با کشیدن و رها کردن</h2>
                    <span class="subtitle">بلوک‌ها را به پایین بکشید</span>
                </div>
                
                <div class="builder-area" id="builderArea">
                    <span class="big-icon">📐</span>
                    <p style="font-size:16px; font-weight:600; color:#555;">برای شروع ساخت صفحه، یک بلوک را اینجا رها کنید</p>
                    
                    <div class="builder-blocks">
                        <div class="block-item" draggable="true" ondragstart="dragStart(event)">
                            <span class="block-icon">📝</span>
                            <span class="block-name">متن</span>
                        </div>
                        <div class="block-item" draggable="true" ondragstart="dragStart(event)">
                            <span class="block-icon">🖼️</span>
                            <span class="block-name">تصویر</span>
                        </div>
                        <div class="block-item" draggable="true" ondragstart="dragStart(event)">
                            <span class="block-icon">🎬</span>
                            <span class="block-name">ویدیو</span>
                        </div>
                        <div class="block-item" draggable="true" ondragstart="dragStart(event)">
                            <span class="block-icon">📊</span>
                            <span class="block-name">جدول</span>
                        </div>
                        <div class="block-item" draggable="true" ondragstart="dragStart(event)">
                            <span class="block-icon">🎯</span>
                            <span class="block-name">فرم</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/database.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        if (!Auth.isLoggedIn()) window.location.href = 'login.html';
        
        const user = Auth.getCurrentUser();
        if (user) document.getElementById('userDisplay').textContent = user.display_name || user.username;

        function dragStart(e) {
            e.dataTransfer.setData('text', e.target.closest('.block-item').innerHTML);
        }

        const builderArea = document.getElementById('builderArea');

        builderArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.style.borderColor = 'var(--primary)';
            this.style.background = 'rgba(34,113,177,0.05)';
        });

        builderArea.addEventListener('dragleave', function(e) {
            this.style.borderColor = 'var(--border)';
            this.style.background = 'transparent';
        });

        builderArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.borderColor = 'var(--border)';
            this.style.background = 'transparent';
            
            const data = e.dataTransfer.getData('text');
            const newBlock = document.createElement('div');
            newBlock.className = 'block-item';
            newBlock.style.cssText = 'display:inline-block; margin:5px; cursor:default; background:#fff; padding:10px 20px; border:1px solid var(--primary); border-radius:8px;';
            newBlock.innerHTML = data;
            
            const placeholder = this.querySelector('p');
            if (placeholder) placeholder.textContent = '✅ بلوک اضافه شد!';
            
            const blocksContainer = this.querySelector('.builder-blocks');
            if (blocksContainer) {
                this.insertBefore(newBlock, blocksContainer);
            } else {
                this.appendChild(newBlock);
            }
            
            alert('✅ بلوک با موفقیت اضافه شد!');
        });
    </script>
</body>
</html>
