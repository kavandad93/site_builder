<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کتابخانه رسانه - سایت‌ساز حرفه‌ای</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <style>
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .media-item {
            background: #f8f9fa;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.3s;
        }
        .media-item:hover {
            border-color: var(--primary);
            transform: scale(1.02);
        }
        .media-item .preview {
            height: 120px;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--gray);
        }
        .media-item .info {
            padding: 10px;
            font-size: 12px;
            text-align: center;
        }
        .media-item .info .name {
            font-weight: 600;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-content">
            <div class="logo"><a href="index.html">🚀 <span>Site</span>Builder</a></div>
            <div class="admin-user">
                <span id="userDisplay">مدیر</span>
                <div class="avatar">M</div>
                <a href="#" onclick="Auth.logout(); return false;" style="color:#c3c4c7; text-decoration:none; font-size:13px;">خروج</a>
            </div>
        </div>
    </header>

    <div class="admin-wrap">
        <aside class="admin-sidebar">
            <a href="index.html" class="menu-item"><span class="icon">📊</span><span>پیشخوان</span></a>
            <a href="posts.html" class="menu-item"><span class="icon">📝</span><span>مطالب</span></a>
            <a href="pages.html" class="menu-item"><span class="icon">📄</span><span>صفحات</span></a>
            <a href="category.html" class="menu-item"><span class="icon">🏷️</span><span>دسته‌بندی‌ها</span></a>
            <a href="media.html" class="menu-item active"><span class="icon">🖼️</span><span>رسانه</span></a>
            <a href="users.html" class="menu-item"><span class="icon">👤</span><span>کاربران</span></a>
            <a href="builder.html" class="menu-item"><span class="icon">🧩</span><span>سازنده صفحه</span></a>
            <div class="menu-divider"></div>
            <a href="settings.html" class="menu-item"><span class="icon">⚙️</span><span>تنظیمات</span></a>
            <a href="../index.html" class="menu-item" target="_blank"><span class="icon">🌐</span><span>مشاهده سایت</span></a>
        </aside>

        <main class="admin-main">
            <div class="top-bar">
                <h1>🖼️ کتابخانه رسانه</h1>
                <div class="actions">
                    <button class="btn btn-primary" onclick="uploadMedia()">📤 آپلود فایل</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>فایل‌های آپلود شده</h2>
                </div>
                <div class="media-grid" id="mediaGrid">
                    <div class="media-item">
                        <div class="preview">🖼️</div>
                        <div class="info">
                            <span class="name">تصویر-نمونه.jpg</span>
                            <span style="color:var(--gray);">۲.۴ مگابایت</span>
                        </div>
                    </div>
                    <div class="media-item">
                        <div class="preview">📄</div>
                        <div class="info">
                            <span class="name">مستندات.pdf</span>
                            <span style="color:var(--gray);">۱.۸ مگابایت</span>
                        </div>
                    </div>
                    <div class="media-item">
                        <div class="preview">🎬</div>
                        <div class="info">
                            <span class="name">ویدیو-آموزشی.mp4</span>
                            <span style="color:var(--gray);">۴۵ مگابایت</span>
                        </div>
                    </div>
                    <div class="media-item">
                        <div class="preview">🖼️</div>
                        <div class="info">
                            <span class="name">بنر-سایت.png</span>
                            <span style="color:var(--gray);">۳.۲ مگابایت</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/database.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        if (!Auth.isLoggedIn()) window.location.href = 'login.html';
        
        const user = Auth.getCurrentUser();
        if (user) document.getElementById('userDisplay').textContent = user.display_name || user.username;

        function uploadMedia() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,.pdf,.mp4,.zip';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const media = DB.get(DB.keys.media) || [];
                        const newItem = {
                            id: media.length + 1,
                            name: file.name,
                            size: (file.size / 1024 / 1024).toFixed(1) + ' مگابایت',
                            type: file.type,
                            data: ev.target.result,
                            created_at: new Date().toISOString()
                        };
                        media.push(newItem);
                        DB.set(DB.keys.media, media);
                        loadMedia();
                        alert('✅ فایل با موفقیت آپلود شد!');
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function loadMedia() {
            const media = DB.get(DB.keys.media) || [];
            const grid = document.getElementById('mediaGrid');
            
            if (media.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--gray);">هیچ فایلی آپلود نشده است</p>';
                return;
            }
            
            const icons = {
                'image': '🖼️',
                'pdf': '📄',
                'video': '🎬',
                'zip': '📦',
                'default': '📎'
            };
            
            grid.innerHTML = media.map(item => {
                let icon = icons.default;
                if (item.type?.startsWith('image/')) icon = icons.image;
                else if (item.type === 'application/pdf') icon = icons.pdf;
                else if (item.type?.startsWith('video/')) icon = icons.video;
                else if (item.type === 'application/zip') icon = icons.zip;
                
                return `<div class="media-item">
                    <div class="preview">${icon}</div>
                    <div class="info">
                        <span class="name">${item.name}</span>
                        <span style="color:var(--gray);">${item.size}</span>
                    </div>
                </div>`;
            }).join('');
        }

        loadMedia();
    </script>
</body>
</html>
